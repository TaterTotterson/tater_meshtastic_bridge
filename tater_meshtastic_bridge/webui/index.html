<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tater Meshtastic Bridge</title>
    <link rel="stylesheet" href="/ui/static/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <div id="app-shell" class="app-shell">
      <aside class="sidebar">
        <div class="brand-wrap">
          <div class="brand-dot"></div>
          <div>
            <h1>Tater</h1>
            <p>Meshtastic Bridge Console</p>
          </div>
        </div>

        <nav class="nav-stack" aria-label="Primary">
          <button class="nav-btn active" data-view="dashboard">Dashboard</button>
          <button class="nav-btn" data-view="radio">Radio</button>
          <button class="nav-btn" data-view="chat">Chat</button>
          <button class="nav-btn" data-view="nodes">Nodes</button>
          <button class="nav-btn" data-view="channels">Channels</button>
          <button class="nav-btn" data-view="configs">Configs</button>
          <button class="nav-btn" data-view="audit">Audit</button>
          <button class="nav-btn" data-view="settings">Settings</button>
        </nav>

        <section class="sidebar-card">
          <div class="sidebar-card-label">Bridge Status</div>
          <div id="sidebar-status" class="sidebar-card-value">Loading...</div>
        </section>
      </aside>

      <main class="main-pane">
        <header class="topbar">
          <div>
            <h2 id="view-title">Dashboard</h2>
            <p id="view-subtitle">Live status, stats, and radio overview.</p>
          </div>
          <div class="topbar-actions">
            <button id="refresh-btn" class="inline-btn" type="button">Refresh</button>
          </div>
        </header>

        <section id="notice-root" class="notice-root"></section>
        <section id="view-root" class="view-root"></section>
      </main>
    </div>

    <script src="/ui/static/app.js" defer></script>
  </body>
</html>
